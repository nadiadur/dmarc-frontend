name: Maintainability Check - Frontend

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint-frontend:
    name: ESLint - Next.js Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Run ESLint
        run: npx eslint app/ components/ lib/
